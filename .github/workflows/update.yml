name: 毎朝AIニュース更新

# ─────────────────────────────────────
# 起動条件
# ─────────────────────────────────────
on:
  # 毎朝7時（日本時間）に自動実行
  # UTC 22:00 = JST 07:00
  schedule:
    - cron: '0 22 * * *'

  # GitHubの画面から手動でも実行できる
  workflow_dispatch:

# ─────────────────────────────────────
# ジョブ定義
# ─────────────────────────────────────
jobs:
  update-news:
    name: 記事取得・要約・JSON更新
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリをチェックアウト
      - name: リポジトリを取得
        uses: actions/checkout@v4

      # 2. Python 3.11 をセットアップ
      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 依存パッケージをインストール
      - name: パッケージをインストール
        run: pip install -r requirements.txt

      # 4. 記事取得 → スコアリング → 要約 → JSON出力
      - name: ニュースを更新
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/main.py

      # 5. 変更があればコミット & プッシュ
      - name: 変更をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "🤖 AIニュース更新 $(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M') JST"
          git push
