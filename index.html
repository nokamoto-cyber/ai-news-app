<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日のAIニュース</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-content">
      <div class="header-title">
        <div>
          <h1>今日のAIニュース</h1>
          <p class="header-subtitle">Zenn / Dev.to / note から厳選 TOP 3</p>
        </div>
      </div>
      <div class="header-meta" id="updated-at">取得中...</div>
    </div>
  </header>

  <main class="container">

    <div class="update-row">
      <button class="btn-update" id="btn-update" onclick="handleUpdate()">
        <span class="btn-spinner" id="btn-spinner"></span>
        <span id="btn-label">最新ニュースを取得</span>
      </button>
    </div>
    <p class="update-status" id="update-status"></p>
    

    <section class="trends-bar" id="trends-bar" style="display:none">
      <span class="trends-label">トレンド</span>
      <div class="trends-chips" id="trends-chips"></div>
    </section>

    <div class="cards-grid" id="cards-grid">
      <div class="loading-state">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>

  </main>

  <footer class="footer">
    毎朝 7 時に自動更新 &nbsp;·&nbsp; Gemini AI で要約・翻訳
  </footer>

  <script>
  const MEDALS  = ['🥇','🥈','🥉'];
  const SRC_CLS = { Zenn:'zenn', 'Dev.to':'devto', note:'note' };

  function fmtDate(s) {
    if (!s) return '';
    const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    return m ? `${m[1]}.${m[2]}.${m[3]}` : s;
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isNew(dateStr) {
    if (!dateStr) return false;
    return Date.now() - new Date(dateStr).getTime() < 48 * 3600 * 1000;
  }

  async function loadData() {
    const res = await fetch('/api/news?t=' + Date.now());
    if (!res.ok) throw new Error('/api/news の読み込みに失敗しました');
    return res.json();
  }

  function buildCard(a) {
    const rank     = a.rank || 1;
    const srcCls   = SRC_CLS[a.source] || 'note';
    const newBadge = isNew(a.published_at) ? '<span class="badge badge-new">NEW</span>' : '';
    const enBadge  = a.lang === 'en' ? '<span class="badge badge-en">EN→JP</span>' : '';
    const summary  = (a.summary || []).slice(0, 3)
      .map((t,i) => `<li><span class="num">・</span>${esc(t)}</li>`).join('');
    const likes    = a.likes    > 0 ? `<span class="stat">👍 ${a.likes}</span>`    : '';
    const comments = a.comments > 0 ? `<span class="stat">💬 ${a.comments}</span>` : '';
    const date     = a.published_at  ? `<span class="stat">・ ${fmtDate(a.published_at)}</span>` : '';

    return `
    <a class="card rank-${rank}" href="${esc(a.url)}" target="_blank" rel="noopener">
      <div class="card-inner">
        <div class="card-top">
          <span class="medal">${MEDALS[rank-1]||'📄'}</span>
          <span class="badge src-${srcCls}">${esc(a.source)}</span>
          ${newBadge}${enBadge}
          <span class="card-date">${fmtDate(a.published_at||'')}</span>
        </div>
        <h2 class="card-title" style="-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden">${esc(a.title_ja || a.title)}</h2>
        <br>
        <ul class="summary"><small>■ 要約（ポイント）</small>${summary}</ul>
        <br>
        <div class="highlight">
          <span class="highlight-text">${esc(a.highlight||'')}</span>
        </div>
        <div class="card-footer">
          <div class="stats">${likes}${comments}${date}</div>
          <span class="read-link">→ 元記事を読む</span>
        </div>
      </div>
    </a>`;
  }

  function render(data) {
    document.getElementById('updated-at').textContent =
      data.updated_at ? '最終更新 ' + data.updated_at : '';

    if (data.trending_keywords?.length) {
      document.getElementById('trends-chips').innerHTML =
        data.trending_keywords.map(k => `<span class="chip">#${esc(k)}</span>`).join('');
      document.getElementById('trends-bar').style.display = 'flex';
    }

    const grid = document.getElementById('cards-grid');
    grid.innerHTML = data.articles?.length
      ? data.articles.map(buildCard).join('')
      : '<p class="empty">記事が見つかりませんでした。</p>';
  }

  async function init() {
    try {
      render(await loadData());
    } catch (e) {
      document.getElementById('cards-grid').innerHTML =
        `<div class="error-state">
           <p>データの読み込みに失敗しました</p>
           <p style="font-size:.8rem;color:#888;margin-top:8px">${esc(e.message)}</p>
         </div>`;
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('update-status');
    el.textContent = msg;
    el.className   = 'update-status' + (type ? ' ' + type : '');
  }

  function setLoading(on) {
    const btn     = document.getElementById('btn-update');
    const spinner = document.getElementById('btn-spinner');
    const label   = document.getElementById('btn-label');
    btn.disabled          = on;
    spinner.style.display = on ? 'inline-block' : 'none';
    label.textContent     = on ? '取得中...' : '最新ニュースを取得';
  }

 async function handleUpdate() {
    setLoading(true);
    setStatus('データを再読み込み中...');
    try {
      await init();
      setStatus('更新しました', 'success');
      setTimeout(() => setStatus(''), 2000);
    } catch (e) {
      setStatus('エラー: ' + e.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  init();
  </script>
</body>
</html>
